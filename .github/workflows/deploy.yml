name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install and test
        run: |
          python -m pip install ".[azure]"
          python -m unittest discover -v
          python -m compileall -q airco_tracker tests
          bash -n scripts/*.sh

      - name: Compile Bicep templates
        run: |
          az bicep install
          for template in infra/*.bicep; do
            az bicep build --file "$template" --stdout >/dev/null
          done

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy immutable image
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          BOL_BACKEND: ${{ vars.BOL_BACKEND }}
          KEY_VAULT_SECRET_MAP: ${{ vars.KEY_VAULT_SECRET_MAP }}
          IMAGE_TAG: ${{ github.sha }}
        run: ./scripts/deploy-application.sh

      - name: Write deployment summary
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          {
            echo "## Azure deployment"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Resource group: \`${AZURE_RESOURCE_GROUP}\`"
            echo "- Job: \`airco-tracker-job\`"
          } >> "$GITHUB_STEP_SUMMARY"
